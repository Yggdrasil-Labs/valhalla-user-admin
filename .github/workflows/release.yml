name: Release

on:
  push:
    tags:
      - 'v*'
  # 支持手动触发（基于已存在的 tag 构建发布）
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（例如：1.2.0，不需要 v 前缀；要求对应 tag v{version} 已存在）'
        required: true
        type: string
      skip_ghcr:
        description: '跳过 GitHub Packages (GHCR) 镜像发布'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22.14.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ref: ${{ steps.prepare.outputs.ref }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      image: ${{ steps.prepare.outputs.image }}
    steps:
      - name: Prepare ref/version/tag/image
        id: prepare
        run: |
          set -euo pipefail

          # 支持 tag push 和手动触发两种方式
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
            REF="refs/tags/${TAG_NAME}"
            echo "Manual trigger detected"
          else
            REF="${GITHUB_REF}"
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"  # 移除 'v' 前缀
            echo "Tag push detected"
          fi

          # GHCR 镜像仓库名必须小写：ghcr.io/<org>/<repo>
          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO_LC}"

          echo "Ref: $REF"
          echo "Tag: $TAG_NAME"
          echo "Version: $VERSION"
          echo "Image: $IMAGE"

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build-verify:
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  build-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-verify]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for production
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-${{ needs.prepare.outputs.version }}
          path: dist/
          retention-days: 30

  # ==================== Docker 镜像发布 ====================
  publish-docker-image:
    name: Build & Push Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: [prepare, build-release]
    # 手动触发时支持跳过
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_ghcr == 'true') }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ needs.prepare.outputs.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODE=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IMAGE="${{ needs.prepare.outputs.image }}"
          echo "============================================"
          echo "🐳 Docker 镜像发布成功！"
          echo "============================================"
          echo ""
          echo "📦 镜像地址:"
          echo "   ${IMAGE}:${VERSION}"
          echo "   ${IMAGE}:latest"
          echo ""
          echo "🚀 拉取命令:"
          echo "   docker pull ${IMAGE}:${VERSION}"

  create-github-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-release, publish-docker-image]
    # 允许 publish-docker-image 在手动触发跳过时继续创建 GitHub Release
    if: >-
      ${{ always()
          && needs.build-release.result == 'success'
          && (needs['publish-docker-image'].result == 'success' || needs['publish-docker-image'].result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG_NAME="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          # 默认 release notes（带图标）
          DEFAULT_NOTES="## 🚀 Release $VERSION

          Release $VERSION is now available! 🎉

          📝 See the [changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."

          # 检查 CHANGELOG.md 是否存在
          if [ ! -f "CHANGELOG.md" ]; then
            echo "CHANGELOG.md not found, using default release notes"
            RELEASE_NOTES="$DEFAULT_NOTES"
          else
            # release-please 生成的 CHANGELOG 格式通常是：
            # ## [1.0.0](https://...) (2024-01-01)
            # 或
            # ## 1.0.0 (2024-01-01)

            # 尝试提取对应版本的 release notes
            EXTRACTED=$(awk -v version="$VERSION" '
              BEGIN {
                found=0
                in_section=0
              }
              /^## \[/ || /^## [0-9]/ {
                if (in_section) exit
                if (index($0, "[" version "]") > 0 || index($0, "## " version) == 1) {
                  found=1
                  in_section=1
                  print
                  next
                }
              }
              in_section { print }
            ' CHANGELOG.md)

            if [ -n "$EXTRACTED" ] && [ ${#EXTRACTED} -gt 10 ]; then
              # 为版本标题添加火箭图标
              CHANGELOG_CONTENT=$(echo "$EXTRACTED" | sed \
                -e 's/^## \[\([^]]*\)\]/## 🚀 Release \1/g' \
                -e 's/^## \([0-9][^ ]*\) /## 🚀 Release \1 /g' \
                -e 's/BREAKING CHANGE/💥 BREAKING CHANGE/g' \
                -e 's/Breaking Change/💥 Breaking Change/g')

              # 构建 release notes
              RELEASE_NOTES=""
              RELEASE_NOTES="${RELEASE_NOTES}🎉 **Release ${VERSION} is now available!**"
              RELEASE_NOTES="${RELEASE_NOTES}"$'\n'$'\n'
              RELEASE_NOTES="${RELEASE_NOTES}${CHANGELOG_CONTENT}"
              RELEASE_NOTES="${RELEASE_NOTES}"$'\n'$'\n'
              RELEASE_NOTES="${RELEASE_NOTES}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              RELEASE_NOTES="${RELEASE_NOTES}"$'\n'$'\n'
              RELEASE_NOTES="${RELEASE_NOTES}📖 [View Full Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) | 📋 [Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)"

              echo "Successfully extracted and enhanced release notes from CHANGELOG.md"
            else
              echo "Could not extract release notes from CHANGELOG.md, using default"
              RELEASE_NOTES="$DEFAULT_NOTES"
            fi
          fi

          # 使用 multiline output
          {
            echo "release_notes<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "Release notes prepared (first 300 chars):"
          echo "$RELEASE_NOTES" | head -c 300
          echo ""

      - name: Download build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist-${{ needs.prepare.outputs.version }}
          path: dist/

      - name: Create release archive
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd dist
          zip -r "../valhalla-user-admin-${VERSION}.zip" .
          cd ..
          echo "Created release archive: valhalla-user-admin-${VERSION}.zip"
          ls -la *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.2.0
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: ${{ steps.changelog.outputs.release_notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            valhalla-user-admin-${{ needs.prepare.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
