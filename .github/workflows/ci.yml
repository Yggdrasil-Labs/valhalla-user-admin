name: CI

on:
  push:
    branches: [main]
    # 只在“会影响构建/类型/依赖”的变更时跑 CI，避免 docs/配置杂项触发
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.*'
      - 'eslint.config.*'
      - 'tsconfig*.json'
      - 'vitest.config.*'
      - 'playwright.config.*'
      # 允许修改 CI 自身时触发验证
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.*'
      - 'eslint.config.*'
      - 'tsconfig*.json'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

# 取消同一 PR/分支上的旧 run，避免“同步事件风暴”造成大量排队
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22.14.0'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check